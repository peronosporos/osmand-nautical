name: Remote Marine Compiler

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Execute Cloud Compilation
      env:
        # Allocates a massive 4GB heap space to the remote compiler
        _JAVA_OPTIONS: "-Xmx4g"
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.workers.max=2"
      run: ./gradlew :OsmAnd:assembleAndroidFullLegacyArm64Debug -x test --no-daemon
